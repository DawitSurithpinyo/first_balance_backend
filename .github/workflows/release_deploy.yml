name: release and deploy

on:
  pull_request:
    branches: 
      main
    types: 
      [closed]

jobs:
  build_and_release:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      LABEL: ${{ github.event.pull_request.labels[0].name }}
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: authenticate to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Calculate SemVer
        run: |
          VERSION=$(git describe --tags --abbrev=0)
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

          IFS='.' read -r MAJOR MINOR PATCH <<< "${VERSION#v}"

          if [ "$LABEL" == "major" ]; then
            MAJOR=$((MAJOR + 1))
            MINOR=0
            PATCH=0
          elif [ "$LABEL" == "minor" ]; then
            MINOR=$((MINOR + 1))
            PATCH=0
          elif [ "$LABEL" == "patch" ]; then
            PATCH=$((PATCH + 1))
          else
            echo "Invalid label: $LABEL"
            exit 1
          fi

          echo "NEW_VERSION=v${MAJOR}.${MINOR}.${PATCH}" >> "$GITHUB_ENV"

      - name: Create tag
        run: |
          git tag "${{ env.NEW_VERSION }}"
          git push origin "${{ env.NEW_VERSION }}"

      - name: Build and push back end
        uses: docker/build-push-action@v7
        with:
          file: Dockerfile.back
          push: true
          platforms: linux/amd64,linux/arm64 
          tags: |
            ${{ vars.DOCKERHUB_USERNAME }}/back:${{ env.NEW_VERSION }}
            ${{ vars.DOCKERHUB_USERNAME }}/back:latest

      - name: Build and push redis
        uses: docker/build-push-action@v7
        with:
          file: Dockerfile.redis
          push: true
          platforms: linux/amd64,linux/arm64 
          tags: |
            ${{ vars.DOCKERHUB_USERNAME }}/redis:${{ env.NEW_VERSION }}
            ${{ vars.DOCKERHUB_USERNAME }}/redis:latest

  deploy:
    needs: build_and_release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      ENV: ${{ secrets.ENV }}
      PROD_CLIENT_SECRETS_FILE: ${{ secrets.PROD_CLIENT_SECRETS_FILE }}
      PROD_CLIENT_ID: ${{ secrets.PROD_CLIENT_ID }}
      PROD_DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
      PROD_REDIS_HOST: ${{ secrets.PROD_REDIS_HOST }}
      PROD_REDIS_USER: ${{ secrets.PROD_REDIS_USER }}
      PROD_REDIS_PASS: ${{ secrets.PROD_REDIS_PASS }}
      PROD_REDIS_PORT: ${{ secrets.PROD_REDIS_PORT }}
      PROD_FLASK_SECRET_KEY: ${{ secrets.PROD_FLASK_SECRET_KEY }}
    steps:
      - name: SSH and restart with latest image
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          envs: ENV,PROD_CLIENT_SECRETS_FILE,PROD_CLIENT_ID,PROD_DATABASE_URL,PROD_REDIS_HOST,PROD_REDIS_USER,PROD_REDIS_PASS,PROD_REDIS_PORT,PROD_FLASK_SECRET_KEY
          script: |
            cat <<EOF > ~/app/.env
            ENV=$ENV
            PROD_CLIENT_SECRETS_FILE=$PROD_CLIENT_SECRETS_FILE
            PROD_CLIENT_ID=$PROD_CLIENT_ID
            PROD_DATABASE_URL=$PROD_DATABASE_URL
            PROD_REDIS_HOST=$PROD_REDIS_HOST
            PROD_REDIS_USER=$PROD_REDIS_USER
            PROD_REDIS_PASS=$PROD_REDIS_PASS
            PROD_REDIS_PORT=$PROD_REDIS_PORT
            PROD_FLASK_SECRET_KEY=$PROD_FLASK_SECRET_KEY
            EOF

            cd ~/app
            docker compose pull redis
            docker compose up -d redis
            docker compose pull back
            docker compose up -d back